# OpenAI Codex client config for the Documentation MCP Server.
# Add this to ~/.codex/config.toml. The bearer token goes in an ENVIRONMENT
# VARIABLE named below — never paste the token string into this file.
#
# Quick add (writes the [mcp_servers.docs] block below for you):
#   codex mcp add docs --url http://10.0.0.5/mcp --bearer-token-env-var DOCS_MCP_TOKEN
#   #            replace 10.0.0.5 with your server's VPN/LAN IP (internal network, plain HTTP)
#   #            custom port:   --url http://10.0.0.5:8080/mcp   (the :port must equal the server's HTTP_PORT)
#   #            local only:    --url http://localhost/mcp
#   #            public/HTTPS:  --url https://docs-mcp.company.internal/mcp
#
# Then export your token and launch Codex:
#   export DOCS_MCP_TOKEN=tok_yourname_xxxx     # the token your operator gave you
#   codex                                       # inside Codex, run /mcp to confirm it connected

[mcp_servers.docs]
url = "http://10.0.0.5/mcp"               # your server's VPN/LAN IP (internal network, plain HTTP).
                                          #   custom port:  http://10.0.0.5:8080/mcp  (:port = server HTTP_PORT)
                                          #   local only:   http://localhost/mcp
                                          #   public/HTTPS: https://docs-mcp.company.internal/mcp
bearer_token_env_var = "DOCS_MCP_TOKEN"  # NAME of the env var holding your tok_... (not the token)
startup_timeout_sec = 20                 # optional (default 10); headroom for proxy/cold start

# Codex reads $DOCS_MCP_TOKEN at launch and sends:  Authorization: Bearer <token>
# The variable MUST exist in the shell that starts `codex` (HTTP MCP servers get no env injection).

# Older Codex builds gate HTTP MCP behind a top-level flag — uncomment if `/mcp`
# shows the server connected with no tools, or it won't initialize:
# experimental_use_rmcp_client = true

# --- Fallback: stdio bridge via mcp-remote (needs Node/npx) -------------------
# Use only if the native HTTP client above misbehaves. `--allow-http` is required
# for plain http:// (drop it for an https:// production URL).
# [mcp_servers.docs]
# command = "npx"
# args = ["-y", "mcp-remote", "http://10.0.0.5/mcp", "--allow-http",
#         "--header", "Authorization: Bearer ${DOCS_MCP_TOKEN}"]
# env_vars = ["DOCS_MCP_TOKEN"]  # forward from the shell; do not paste the token here
