[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "internal-docs-mcp"
version = "0.1.0"
description = "Self-hosted MCP server that exposes internal documentation to coding agents over Streamable HTTP."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Proprietary" }
dependencies = [
    "fastmcp>=3.0,<4.0",
    "starlette>=0.37",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
# Ingestion / build-path only (heavy: torch + Docling models). Not needed to serve.
parse = [
    "docling>=2.0",
    "tree-sitter>=0.25",
    "tree-sitter-language-pack>=0.9",
]
# Optional vector layer (OFF by default).
vector = [
    "qdrant-client>=1.12",
    "openai>=1.0",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
]

[project.scripts]
docmcp-server = "docmcp.server:main"
docmcp-ingest = "docmcp.ingest.pipeline:main"

[tool.hatch.build.targets.wheel]
packages = ["src/docmcp"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = ["ignore::DeprecationWarning"]
markers = [
    "docling: imports Docling/torch and runs real document conversion (slow; skip with -m 'not docling')",
]
